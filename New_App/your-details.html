<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swinton Go! Insurance – About You</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <a href="index.html">
      <img src="assets/logo.png" alt="Swinton Go! Insurance" class="logo">
    </a>
    <nav class="progress-nav" aria-label="Quote progress">
      <div class="step-wrap">
        <div class="step active" id="step-details">
          <div class="dot"></div>
          Your details
        </div>
      </div>
      <div class="step-line"></div>
      <div class="step-wrap">
        <div class="step" id="step-car">
          <div class="dot"></div>
          Your car
        </div>
      </div>
      <div class="step-line"></div>
      <div class="step-wrap">
        <div class="step" id="step-cover">
          <div class="dot"></div>
          Your cover
        </div>
      </div>
      <div class="step-line"></div>
      <div class="step-wrap">
        <div class="step" id="step-quote">
          <div class="dot"></div>
          Quote
        </div>
      </div>
    </nav>
  </header>

  <!-- MAIN -->
  <main>
    <div class="page-content">
      <h1>About you</h1>
      <p class="page-subtitle">Tell us a little more about yourself so we can find you the best quote</p>

      <div style="max-width:600px;">
        <form data-next="vehicle-lookup.html">

          <!-- Marital Status -->
          <div class="form-group">
            <label class="form-label">Marital status</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="maritalStatus" value="Single"> Single</label>
              <label class="radio-label"><input type="radio" name="maritalStatus" value="Married"> Married</label>
              <label class="radio-label"><input type="radio" name="maritalStatus" value="CivilPartner"> Civil Partner</label>
              <label class="radio-label"><input type="radio" name="maritalStatus" value="Divorced"> Divorced</label>
              <label class="radio-label"><input type="radio" name="maritalStatus" value="Widowed"> Widowed</label>
              <label class="radio-label"><input type="radio" name="maritalStatus" value="Separated"> Separated</label>
            </div>
          </div>

          <hr class="divider">

          <!-- Address Lookup -->
          <div class="form-group">
            <label class="form-label" for="postcodeInput">What is your home postcode?</label>
            <div class="postcode-row">
              <input type="text" id="postcodeInput" name="postcode" class="form-input"
                     placeholder="e.g. M1 1AA" maxlength="8" autocomplete="postal-code">
              <button type="button" id="findAddressBtn" class="btn btn-secondary" style="white-space:nowrap; padding:12px 20px;">
                Find address
              </button>
            </div>
            <p class="text-muted mt-8">Or <a href="#" style="color:var(--navy);">enter address manually</a></p>
          </div>

          <hr class="divider">

          <!-- UK Resident -->
          <div class="form-group">
            <label class="form-label">Have you lived in the UK for 3 or more years?</label>
            <div class="radio-group--inline radio-group">
              <label class="radio-label"><input type="radio" name="ukResident" value="Yes"> Yes</label>
              <label class="radio-label"><input type="radio" name="ukResident" value="No"> No</label>
            </div>
          </div>

          <hr class="divider">

          <!-- Home Owner -->
          <div class="form-group">
            <label class="form-label">Are you a homeowner?</label>
            <div class="radio-group--inline radio-group">
              <label class="radio-label"><input type="radio" name="homeOwner" value="Yes"> Yes</label>
              <label class="radio-label"><input type="radio" name="homeOwner" value="No"> No</label>
            </div>
          </div>

          <hr class="divider">

          <!-- Employment Status -->
          <div class="form-group">
            <label class="form-label" for="employmentStatus">Employment status</label>
            <select id="employmentStatus" name="employmentStatus" class="form-select">
              <option value="">Please select...</option>
              <option value="employed">Employed (full time)</option>
              <option value="employed-pt">Employed (part time)</option>
              <option value="self-employed">Self-employed</option>
              <option value="unemployed">Unemployed</option>
              <option value="retired">Retired</option>
              <option value="student">Student</option>
              <option value="homemaker">Homemaker</option>
              <option value="not-employed">Not employed due to disability</option>
            </select>
          </div>

          <!-- Buttons -->
          <div class="btn-container--right" style="margin-top:36px;">
            <a href="index.html" class="btn-back">← Back</a>
            <button type="submit" class="btn btn-primary">Continue</button>
          </div>

        </form>
      </div>

    </div><!-- /.page-content -->
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="site-footer-inner">
      <p>© 2026 <strong>Swinton Go!</strong> All rights reserved</p>
      <div class="footer-links">
        <a href="#">Important info</a>
        <span class="sep"> / </span>
        <a href="#" class="footer-ext">Privacy policy</a>
        <span class="sep"> / </span>
        <a href="#" class="footer-ext">Cookie policy</a>
        <span class="sep"> / </span>
        <a href="#">Contact us</a>
      </div>
    </div>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
